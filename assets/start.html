<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exporting Video - GoExport</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/png" href="icon.png" />
    <!-- Add this inside the <body> tag, before the closing </body> -->
    <script>
      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      document.addEventListener("DOMContentLoaded", function () {
        const obsParam = getQueryParam("obs");
        const width = getQueryParam("w") || 1280;
        const height = getQueryParam("h") || 720;
        const resolutionSpan = document.getElementById("resolution");
        resolutionSpan.textContent = `${width}x${height} (${width === 1280 && height === 720 ? '720p' : width === 1920 && height === 1080 ? '1080p' : 'Custom'})`;
        
        const noticeDiv = document.querySelector("#obs");
        const statusSpan = document.querySelector("#status");
        if (obsParam === "true") {
          noticeDiv.innerHTML = "<strong>Status:</strong> OBS capture mode active. Recording in progress.";
          statusSpan.textContent = "Recording with OBS...";
        } else if (obsParam === "false") {
          noticeDiv.innerHTML = "<strong>Status:</strong> Direct capture mode. Do not interact with this window.";
          statusSpan.textContent = "Processing video...";
        }
        // Simulate progress for demo
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 10;
          if (progress > 100) progress = 100;
          document.getElementById("progressFill").style.width = progress + "%";
          document.getElementById("progressText").textContent = "Exporting... " + Math.round(progress) + "%";
          if (progress >= 100) clearInterval(interval);
        }, 1000);
      });
    </script>
    <style type="text/css">
      /* Basic, widely supported CSS (avoids modern layout features) */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a2e; /* dark blue background like GoAnimate */
        color: #e8e8e8;
        font: 16px/1.5 Arial, Helvetica, sans-serif;
        overflow: hidden;
      }

      /* Table layout for vertical centering (legacy-friendly) */
      .wrapper {
        display: table;
        width: 100%;
        height: 100%;
      }
      .center {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
        padding: 20px;
      }

      .panel {
        display: inline-block;
        text-align: left;
        background: #16213e; /* darker blue */
        border: 1px solid #0f3460;
        padding: 24px;
        max-width: 600px;
        width: 100%;
        border-radius: 8px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 20px 0;
        letter-spacing: 0.5px;
        color: #e94560; /* accent color */
        text-align: center;
      }

      .progress-container {
        margin: 20px 0;
      }

      .progress-bar {
        width: 100%;
        height: 20px;
        background: #0f3460;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #e94560, #0f3460);
        width: 0%;
        transition: width 0.3s ease;
      }

      .progress-text {
        text-align: center;
        font-size: 14px;
        color: #cbd2d9;
      }

      .notice {
        background: #0f3460;
        border-left: 4px solid #e94560;
        padding: 12px;
        margin: 12px 0 16px 0;
        color: #ffffff;
        border-radius: 4px;
      }

      .export-info {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #0f3460;
      }

      .info-item {
        margin-bottom: 8px;
        font-size: 14px;
      }

      .small {
        font-size: 13px;
        color: #cbd2d9;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="center">
        <div class="panel" role="region" aria-label="Video Export Progress">
          <h1>Exporting Video</h1>

          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div class="progress-text" id="progressText">Preparing export...</div>
          </div>

          <div id="obs" class="notice" role="alert">
            <strong>Status:</strong> Initializing video capture. Please keep this window open.
          </div>

          <p class="small">
            Your video is being processed. This may take a few minutes depending on length and resolution.
          </p>

          <div class="export-info">
            <div class="info-item"><strong>Resolution:</strong> <span id="resolution">1280x720 (720p)</span></div>
            <div class="info-item"><strong>Format:</strong> MP4</div>
            <div class="info-item"><strong>Status:</strong> <span id="status">Starting...</span></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
